spring:
  application:
    name:productservice

  datasource:
    url: jdbc:postgresql://localhost:6100/postgres
    username: user
    password: pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baselin-on-migration: true


springdoc:
  api-docs:
    path: /v1
  swagger-ui:
    path: /swagger-ui

server:
  port: 9110
