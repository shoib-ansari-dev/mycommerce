spring:
  profiles:
    active: dev
  application:
    name: productservice

  datasource:
    url: jdbc:postgresql://localhost:6100/postgres
    username: user
    password: pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mvc:
    static-path-pattern: /**

  web:
    resources:
      add-mappings: true

springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_0
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs


server:
  port: 9110
